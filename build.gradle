// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:7.0.2"
    }
}

// allprojects is a convenient place to configure common settings for all sub-projects/modules.
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// task to clean the project
tasks {
    clean {
        delete rootProject.buildDir
    }
}